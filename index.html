<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>純前端真正可用 LLM 對話測試</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; text-align: center; }
        input { width: 80%; padding: 12px; font-size: 16px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007BFF; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-weight: bold; color: #666; margin: 15px 0; background: #fff3cd; padding: 10px; border-radius: 4px; }
        #chatbox { margin-top: 30px; padding: 20px; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; text-align: left; min-height: 60px; line-height: 1.5; }
    </style>
</head>
<body>

    <h2>🤖 100% 本地智能對話測試 (Qwen)</h2>
    <p>完全不用 API Key。這是一個真正能聽懂人話的 Chat 模型！</p>

    <div id="status">正在初始環境中... 請稍候...</div>

    <input type="text" id="userInput" value="Hi" placeholder="同 AI 講句嘢...">
    <br>
    <button id="sendBtn" onclick="generateText()" disabled>等待 AI 準備就緒</button>

    <div id="chatbox"><b>AI 真正回覆：</b> <br><span id="aiReply">等待發送指令...</span></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // 穩定安全設定
        env.backends.onnx.wasm.numThreads = 1;
        env.allowLocalModels = false;

        let generator = null;
        const statusDiv = document.getElementById('status');
        const sendBtn = document.getElementById('sendBtn');
        const outputDiv = document.getElementById('aiReply');

        // 初始化：正式載入通訊、聊天能力強大的 Qwen 0.5B 模型
        async function initAI() {
            try {
                statusDiv.innerText = "正在下載現代化 AI 聊天腦袋 (Qwen 90MB)...";
                
                // 換成阿里開源、支援對話格式的輕量模型
                generator = await pipeline('text-generation', 'Xenova/Qwen1.5-0.5B-Chat');
                
                statusDiv.innerText = "✅ AI 聊天模型已成功載入！它現在就在你部電腦裡面。";
                statusDiv.style.backgroundColor = "#d4edda";
                statusDiv.style.color = "#155724";
                sendBtn.disabled = false;
                sendBtn.innerText = "叫 AI 回覆";
            } catch (err) {
                console.error("Qwen 載入出錯:", err);
                statusDiv.innerText = "❌ 載入失敗: " + (err ? err.message : "未知錯誤");
                statusDiv.style.backgroundColor = "#f8d7da";
            }
        }

        // 對話生成邏輯
        window.generateText = async function() {
            const input = document.getElementById('userInput').value;
            if (!input) return alert("請輸入內容");

            sendBtn.disabled = true;
            sendBtn.innerText = "AI 思考中...";
            outputDiv.innerText = "AI 正在用你部電腦嘅硬件計算緊...";

            try {
                // 套用 Qwen 官方標準對話模板（Chat Prompt Template），強迫它進入對話模式
                const prompt = `<|im_start|>user\n${input}<|im_end|>\n<|im_start|>assistant\n`;

                const response = await generator(prompt, { 
                    max_new_tokens: 50,
                    temperature: 0.6, // 稍微降低隨機性，讓回答更正經
                    return_full_text: false 
                });

                if (response && response[0] && response[0].generated_text) {
                    // 順便把模型可能多吐出來的結束標籤裁切乾淨
                    let reply = response[0].generated_text.split('<|im_end|>')[0].trim();
                    outputDiv.innerText = reply;
                } else {
                    outputDiv.innerText = "AI 聽到了，但它吐出了一片空白。";
                }
            } catch (err) {
                outputDiv.innerText = "❌ 生成失敗: " + err.message;
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "叫 AI 回覆";
            }
        }

        initAI();
    </script>
</body>
</html>
